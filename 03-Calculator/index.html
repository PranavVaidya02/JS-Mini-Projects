<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>

        <div class="calculator">

            <!-- Display -->

            <div class="calculator-display">

                <div class="expression"></div>

                <div class="display-value">0</div>

            </div>

            <!-- Buttons -->

            <div class="calculator-buttons">

                <!-- First Row -->

                <button class="action" data-action="clear">AC</button>
                <button class="action" data-action="delete">DEL</button>
                <button class="operator" data-operator="mod">MOD</button>
                <button class="operator" data-operator="/">÷</button>

                <!-- Second Row -->

                <button class="number" data-value="7">7</button>
                <button class="number" data-value="8">8</button>
                <button class="number" data-value="9">9</button>
                <button class="operator" data-operator="*">×</button>

                <!-- Third Row -->

                <button class="number" data-value="4">4</button>
                <button class="number" data-value="5">5</button>
                <button class="number" data-value="6">6</button>
                <button class="operator" data-operator="-">−</button>

                <!-- Fourth Row -->

                <button class="number" data-value="1">1</button>
                <button class="number" data-value="2">2</button>
                <button class="number" data-value="3">3</button>
                <button class="operator" data-operator="+">+</button>

                <!-- Fifth Row -->

                <button class="number zero" data-value="0">0</button>
                <button class="number" data-value=".">.</button>
                <button class="action equal" data-action="calculate">=</button>

            </div>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
